<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}
#wrapper {
  position: relative;
}
#gameCanvas { display: block; }
#menuScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  background: rgba(0,0,0,0.72);
}
#menuScreen h1 {
  color: #fff;
  font-size: 3vw;
  font-weight: bold;
  letter-spacing: 0.1em;
  text-shadow: 0 0 20px rgba(255,200,0,0.8), 0 2px 4px #000;
  margin-bottom: 0.4em;
  text-align: center;
}

  color: #aaa;
  font-size: 1.2vw;
  margin-bottom: 3em;
  letter-spacing: 0.05em;
}
.menu-buttons { display: flex; gap: 3vw; }
.menu-btn {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.6);
  color: #fff;
  font-size: 1.8vw;
  padding: 0.8em 2.5em;
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}
.menu-btn:hover {
  background: rgba(255,200,0,0.25);
  border-color: #ffd700;
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}
#backBtn {
  position: absolute;
  top: 1.5%; left: 1%;
  z-index: 200;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.7);
  padding: 0.3em 0.8em;
  cursor: pointer;
  display: none;
  transition: all 0.2s;
}
#backBtn:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="menuScreen">

    <div class="menu-buttons">

      <button class="menu-btn" onclick="startGame('right')">右置き</button>
    </div>
  </div>
  <button id="backBtn" onclick="goMenu()">メインメニュー</button>
</div>

const wrapper = document.getElementById('wrapper');
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

let W, H;
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const ratio = 16 / 9;
  if (vw / vh > ratio) { H = vh; W = Math.round(H * ratio); }
  else                  { W = vw; H = Math.round(W / ratio); }
  canvas.width  = W;
  canvas.height = H;
  wrapper.style.width  = W + 'px';
  wrapper.style.height = H + 'px';
  document.getElementById('backBtn').style.fontSize = (W * 0.012) + 'px';
  detectSlit(); // recalc slit when resize
}
window.addEventListener('resize', resize);

let slitX = 0, slitW = 0;

function detectSlit() {
  if (!IMG.ui.complete || !IMG.ui.naturalWidth) return;
  const iw = IMG.ui.naturalWidth;
  const ih = IMG.ui.naturalHeight;
  const oc  = document.createElement('canvas');
  oc.width  = iw; oc.height = ih;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(IMG.ui, 0, 0);

  // Scan multiple rows near the top third to find the slit reliably
  let x0 = iw, x1 = -1;
  for (let scanY = Math.floor(ih * 0.1); scanY < Math.floor(ih * 0.5); scanY += 10) {
    const row = oc2.getImageData(0, scanY, iw, 1).data;
    for (let x = 0; x < iw; x++) {
      const r = row[x*4], g = row[x*4+1], b = row[x*4+2];
      if (r < 20 && g < 20 && b < 20) {
        if (x < x0) x0 = x;
        if (x > x1) x1 = x;
      }
    }
  }

  if (x1 >= x0 && x0 < iw) {
    slitX = (x0 / iw) * W;
    slitW = ((x1 - x0 + 1) / iw) * W;
    console.log('Slit px:', x0, x1, '-> canvas px:', slitX.toFixed(1), slitW.toFixed(1));
  }
}

IMG.ui.onload = () => { resize(); detectSlit(); };

// ── Game State ─────────────────────────────────────────────────────
let gameMode = null;
let score = 0, hiScore = 0;
let hiScoreTime = '';
let gameRunning = false;
let target = null, spawnTimer = null;
let hitFlash = 0, missFlash = 0;
let streakBroken = false;  // true after miss/pass, score shows blank until next hit
let hiScoreId = '';

function pad2(n) { return String(n).padStart(2,'0'); }

function getNowStr() {
  const d = new Date();
  return d.getFullYear() + '/' + pad2(d.getMonth()+1) + '/' + pad2(d.getDate()) + '/' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

function getTimeNum() {
  const d = new Date();
  return d.getHours() * 100 + d.getMinutes();
}

function generateId(sc) {
  const letters = ['A','B','C'];
  const mult    = [2, 3, 4];
  const sub     = [1, 2, 3];
  const i1 = Math.floor(Math.random() * 3);
  const i2 = Math.floor(Math.random() * 3);
  const t  = getTimeNum();
  const val = (sc * t) * mult[i1] - sub[i2];
  return 'iD:' + letters[i1] + letters[i2] + val;
}

// Original image dimensions (all target imgs are 1456x819)
const ORIG_W = 1920, ORIG_H = 1080;
// Character center/size detected from actual images
const CHAR_X_ORIG = 960;           // center X of character in image
const CHAR_W_ORIG = 65;            // character body width (px, use max across images)
const CHAR_H_ORIG = 100;

function getScale() { return W / ORIG_W; }

// ── Spawn ──────────────────────────────────────────────────────────
function spawnTarget() {
  const sc     = getScale();
  const imgW   = ORIG_W * sc;
  const imgH   = ORIG_H * sc;
  const charOffX = CHAR_X_ORIG * sc;

  const SPEED  = W / 4.5;

  let imgs, startImgLeft, direction;
  if (gameMode === 'right') {
    // R→L: character starts just off right edge
    imgs = IMG.r2l;
    startImgLeft = W + 20 - charOffX + imgW/2; // char at W+20
    // simpler: charX = imageLeft + charOffX, we want charX = W+20
    startImgLeft = (W + 20) - charOffX;
    direction = -1;
  } else {
    // L→R: character starts just off left edge
    imgs = IMG.l2r;
    startImgLeft = (-20) - charOffX;
    direction = 1;
  }

  target = {
    img: imgs[Math.floor(Math.random() * 3)],
    imgW, imgH, charOffX,
    charW: CHAR_W_ORIG * sc,
    charH: CHAR_H_ORIG * sc,
    imageLeft: startImgLeft,
    direction,
    speed: SPEED,
    passed: false,
  };
}

function scheduleSpawn() {
  const delay = (0.1 + Math.random() * 0.4) * 1000;
  spawnTimer = setTimeout(spawnTarget, delay);
}

// ── Hit Check ─────────────────────────────────────────────────────
function isTargetAtCenter() {
  if (!target) return false;
  // charX = center of character on canvas
  const charX = target.imageLeft + target.charOffX;
  // Tight tolerance: half of character body width
  const tol = target.charW * 0.5;
  return Math.abs(charX - W / 2) <= tol;
}

// ── Input ──────────────────────────────────────────────────────────
function handleTap(e) {
  if (!gameRunning) return;
  e.preventDefault();
  if (isTargetAtCenter()) {
    if (streakBroken) { score = 1; streakBroken = false; }
    else score++;
    if (score > hiScore) {
      hiScore = score;
      hiScoreTime = getNowStr();
      hiScoreId   = generateId(score);
    }
    hitFlash = 14;
    target = null;
    scheduleSpawn();
  } else {
    streakBroken = true;
    missFlash = 14;
  }
}
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', handleTap, { passive: false });

// ── Game Loop ──────────────────────────────────────────────────────
let lastTime = null;
function gameLoop(ts) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (target) {
    target.imageLeft += target.direction * target.speed * dt;
    const charX = target.imageLeft + target.charOffX;
    const offscreen = target.direction === -1 ? charX < -target.charW
                                               : charX > W + target.charW;
    if (offscreen && !target.passed) {
      target.passed = true;
      streakBroken = true;
      missFlash = 20;
      target = null;
      scheduleSpawn();
    }
  }

  draw();
  if (hitFlash  > 0) hitFlash--;
  if (missFlash > 0) missFlash--;
  requestAnimationFrame(gameLoop);
}

// ── Draw ───────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 1. Background (bottom layer)
  ctx.drawImage(IMG.bg, 0, 0, W, H);

  // 2. Target — clipped to slit only, black removed via 'screen'
  if (target && slitW > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(slitX, 0, slitW, H);
    ctx.clip();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(target.img, target.imageLeft, 0, target.imgW, target.imgH);
    ctx.restore();
  }

  // 3. UI overlay — drawn OPAQUE everywhere EXCEPT the slit
  //    We draw left portion and right portion, skipping the slit gap.
  if (slitW > 0) {
    const sx = slitX, sw = slitW;
    // Left of slit
    if (sx > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, sx, H);
      ctx.clip();
      ctx.drawImage(IMG.ui, 0, 0, W, H);
      ctx.restore();
    }
    // Right of slit
    const rx = sx + sw;
    if (rx < W) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx, 0, W - rx, H);
      ctx.clip();
      ctx.drawImage(IMG.ui, 0, 0, W, H);
      ctx.restore();
    }
    // Slit area: draw UI with screen blend so the crosshair dot (white pixel) shows
    // but the black background of the slit stays invisible
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx, 0, sw, H);
    ctx.clip();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(IMG.ui, 0, 0, W, H);
    ctx.restore();
  } else {
    // Fallback before slit detected
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(IMG.ui, 0, 0, W, H);
    ctx.restore();
  }

  // 4. Score UI (drawn on top of everything)
  const fs      = W * 0.035;
  const fsSmall = W * 0.018;

  // Current score — top center
  ctx.save();
  ctx.font        = `bold ${fs}px Arial`;
  ctx.textAlign   = 'center';
  ctx.fillStyle   = hitFlash > 0 ? '#00ff88' : missFlash > 0 ? '#ff4444' : '#ffffff';
  ctx.shadowColor = hitFlash > 0 ? '#00ff88' : missFlash > 0 ? '#ff3333' : 'transparent';
  ctx.shadowBlur  = hitFlash > 0 || missFlash > 0 ? 18 : 0;
  ctx.fillText(score, W / 2, H * 0.07);
  ctx.restore();

  // Hi score — top right
  ctx.save();
  ctx.font        = `${fsSmall}px Arial`;
  ctx.textAlign   = 'right';
  ctx.fillStyle   = '#ffd700';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur  = 6;
  ctx.fillText('BEST: ' + hiScore, W * 0.97, H * 0.06);
  ctx.restore();
}

// ── Menu Control ───────────────────────────────────────────────────
function startGame(mode) {
  gameMode = mode; score = 0; gameRunning = true;
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'block';
  lastTime = null; target = null;
  if (spawnTimer) clearTimeout(spawnTimer);
  scheduleSpawn();
  requestAnimationFrame(gameLoop);
}

function goMenu() {
  gameRunning = false; target = null;
  if (spawnTimer) clearTimeout(spawnTimer);
  document.getElementById('menuScreen').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'none';
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(IMG.bg, 0, 0, W, H);
}

IMG.bg.onload = () => { ctx.drawImage(IMG.bg, 0, 0, W, H); };

resize();
</script>
</body>
