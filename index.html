<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKIAIMX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}
#wrapper {
  position: relative;
}
#gameCanvas { display: block; }
#menuScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  background: rgba(0,0,0,0.72);
}
.title-main {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transform: translateY(-1.2vh);
}
.title-logo {
  width: min(52vw, 680px);
  max-width: 74%;
  height: auto;
  margin-bottom: 0.18em;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.28));
}
#menuScreen h1 {
  color: rgba(255,255,255,0.52);
  font-size: clamp(10px, 0.78vw, 15px);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-shadow: 0 0 8px rgba(255,255,255,0.10), 0 1px 2px #000;
  margin-bottom: 0.14em;
  text-align: right;
}
#menuScreen .version {
  color: rgba(255,255,255,0.62);
  font-size: clamp(8px, 0.62vw, 11px);
  margin-top: 0;
  margin-bottom: 3em;
  letter-spacing: 0.05em;
}
.corner-title {
  position: absolute;
  right: 2.2%;
  bottom: 2.2%;
  text-align: right;
  z-index: 2;
  pointer-events: none;
}
.corner-title .product-line {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0.32em;
  margin-top: 0.08em;
}
.corner-title .product {
  color: rgba(255,255,255,0.40);
  font-size: clamp(7px, 0.5vw, 10px);
  letter-spacing: 0.06em;
}
.corner-title .x-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  pointer-events: auto;
  opacity: 0.68;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.corner-title .x-link:hover {
  opacity: 1;
  transform: scale(1.05);
}
.corner-title .x-icon {
  width: clamp(9px, 0.72vw, 13px);
  height: clamp(9px, 0.72vw, 13px);
  display: block;
  object-fit: contain;
  filter: invert(1);
}
.menu-buttons { display: flex; gap: 3vw; }
.oni-button-row { margin-top: 2vw; display: flex; justify-content: center; }
.expert-button-row { margin-top: 1vw; display: flex; justify-content: center; }
.menu-btn {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.6);
  color: #fff;
  font-size: 1.8vw;
  padding: 0.8em 2.5em;
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
  border-radius: 0.35em;
}
.menu-btn:hover {
  background: rgba(255,200,0,0.25);
  border-color: #ffd700;
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}
.oni-btn {
  color: #8a5cff;
  border-color: rgba(138,92,255,0.75);
  text-shadow: 0 0 10px rgba(138,92,255,0.85);
}
.oni-btn:hover {
  background: rgba(138,92,255,0.25);
  border-color: #8a5cff;
  color: #9d7cff;
  text-shadow: 0 0 14px #8a5cff;
  box-shadow: 0 0 18px rgba(138,92,255,0.5);
}
.expert-btn {
  color: #8a5cff;
  border-color: rgba(138,92,255,0.75);
  text-shadow: 0 0 10px rgba(138,92,255,0.85);
  animation: expert-border-glow 3.2s ease-in-out infinite;
}
.expert-btn:hover {
  background: rgba(138,92,255,0.25);
  border-color: #8a5cff;
  color: #9d7cff;
  text-shadow: 0 0 14px #8a5cff;
  box-shadow: 0 0 18px rgba(138,92,255,0.5);
}
@keyframes expert-border-glow {
  0%, 100% {
    border-color: rgba(138,92,255,0.55);
    box-shadow: 0 0 4px rgba(138,92,255,0.16);
  }
  50% {
    border-color: #8a5cff;
    box-shadow: 0 0 16px rgba(138,92,255,0.45);
  }
}

@media (min-width: 900px) {
  .expert-btn {
    animation-name: expert-border-glow-pc;
  }
}

@keyframes expert-border-glow-pc {
  0%, 100% {
    border-color: rgba(138,92,255,0.55);
    box-shadow: 0 0 20px rgba(138,92,255,0.16);
  }
  50% {
    border-color: #8a5cff;
    box-shadow: 0 0 80px rgba(138,92,255,0.45);
  }
}

.affiliate-ad {
  position: absolute;
  top: 0;
  right: 0;
  z-index: 4;
  transform: scale(0.17);
  transform-origin: top right;
  opacity: 0.68;
  pointer-events: auto;
}
.affiliate-ad table {
  background: rgba(255,255,255,0.88);
}

@media (min-width: 900px) {
  .affiliate-ad {
    transform: scale(0.85);
  }
}

@media (min-width: 900px) {
  .corner-title .product {
    font-size: clamp(17.5px, 1.25vw, 25px);
  }
  .corner-title .x-icon {
    width: clamp(22.5px, 1.8vw, 32.5px);
    height: clamp(22.5px, 1.8vw, 32.5px);
  }
}

.score-check-open {
  position: absolute;
  top: 72px;
  right: 0;
  z-index: 5;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.6);
  color: #fff;
  font-size: 1.8vw;
  padding: 0.8em 2.5em;
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: all 0.2s;
  backdrop-filter: blur(4px);
  border-radius: 0.35em;
  transform: scale(0.52);
  transform-origin: top right;
}
.score-check-open:hover {
  background: rgba(255,200,0,0.25);
  border-color: #ffd700;
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}
.score-check-panel {
  position: absolute;
  top: 50%;
  left: 50%;
  width: min(52vw, 420px);
  max-width: 74%;
  transform: translate(-50%, -50%);
  z-index: 160;
  display: none;
  background: rgba(22,22,22,0.96);
  border: 1px solid rgba(255,255,255,0.24);
  border-radius: 0.7em;
  padding: clamp(0.85em, 2.2vw, 1.25em);
  box-shadow: 0 0 28px rgba(0,0,0,0.65);
  color: #fff;
}
.score-check-panel .close-score-check {
  position: absolute;
  top: 0.45em;
  right: 0.65em;
  background: transparent;
  border: 0;
  color: rgba(255,255,255,0.72);
  font-size: 1.15em;
  cursor: pointer;
}
.score-check-panel .close-score-check:hover { color: #fff; }
.score-check-panel .panel-title {
  font-size: clamp(11px, 1vw, 16px);
  letter-spacing: 0.12em;
  margin-bottom: 0.75em;
  color: rgba(255,255,255,0.88);
}
.score-check-panel label {
  display: block;
  font-size: clamp(9px, 0.78vw, 12px);
  color: rgba(255,255,255,0.68);
  margin: 0.55em 0 0.28em;
}
.score-check-panel input {
  width: 100%;
  background: rgba(70,70,70,0.94);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 0.35em;
  color: #fff;
  font-size: clamp(10px, 0.9vw, 14px);
  padding: 0.5em 0.65em;
  outline: none;
}
.score-check-panel input:focus {
  border-color: rgba(138,92,255,0.9);
  box-shadow: 0 0 10px rgba(138,92,255,0.32);
}
.score-verify-btn {
  margin-top: 1.1em;
  width: 100%;
  background: rgba(138,92,255,0.18);
  border: 2px solid rgba(138,92,255,0.75);
  color: #8a5cff;
  font-size: clamp(10px, 0.9vw, 14px);
  padding: 0.55em 1em;
  cursor: pointer;
  letter-spacing: 0.12em;
  border-radius: 0.35em;
  text-shadow: 0 0 10px rgba(138,92,255,0.85);
}
.score-verify-btn:hover {
  background: rgba(138,92,255,0.25);
  color: #9d7cff;
  box-shadow: 0 0 18px rgba(138,92,255,0.5);
}
.verify-progress {
  display: none;
  width: 100%;
  height: 0.55em;
  margin-top: 1em;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
}
.verify-progress .bar {
  width: 0%;
  height: 100%;
  background: #31FF88;
  border-radius: 999px;
}
.verify-progress.run .bar {
  animation: verify-progress-fill 1.05s ease-out forwards;
}
@keyframes verify-progress-fill {
  from { width: 0%; }
  to { width: 100%; }
}
.verify-result {
  min-height: 1.4em;
  margin-top: 0.9em;
  text-align: center;
  font-size: clamp(10px, 0.9vw, 14px);
  letter-spacing: 0.08em;
}
.verify-result.ok {
  color: #31FF88;
  text-shadow: 0 0 10px rgba(49,255,136,0.45);
}
.verify-result.ng {
  color: #ff9a9a;
  text-shadow: 0 0 8px rgba(255,120,120,0.35);
}
@media (min-width: 900px) {
  .score-check-open {
    top: 276px;
    right: 0;
    transform: scale(0.42);
  }
  .score-check-panel {
    width: min(52vw, 420px);
    max-width: 74%;
  }
}

@media (max-width: 899px) {
  .score-check-panel {
    width: min(52vw, 360px);
    max-width: 74%;
  }
}

.discord-link {
  position: absolute;
  top: 114px;
  right: 0;
  z-index: 5;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: clamp(13px, 0.95vw, 17px);
  height: clamp(13px, 0.95vw, 17px);
  border-radius: 0.28em;
  overflow: hidden;
  opacity: 0.82;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.discord-link:hover {
  opacity: 1;
  transform: scale(1.06);
}
.discord-icon {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
#shareScoreBtn {
  position: absolute;
  top: 12.5%;
  right: 3%;
  z-index: 210;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.7);
  padding: 0.3em 0.8em;
  cursor: pointer;
  display: none;
  transition: all 0.2s;
  border-radius: 0.35em;
  font-size: clamp(10px, 0.9vw, 14px);
  letter-spacing: 0.06em;
}
#shareScoreBtn:hover {
  color: #fff;
  border-color: #fff;
}
@media (min-width: 900px) {
  .discord-link {
    top: 350px;
    right: 0;
    width: clamp(22.5px, 1.9vw, 34px);
    height: clamp(22.5px, 1.9vw, 34px);
  }
}
#backBtn {
  position: absolute;
  top: 1.5%; left: 1%;
  z-index: 200;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.7);
  padding: 0.3em 0.8em;
  cursor: pointer;
  display: none;
  transition: all 0.2s;
}
#backBtn:hover { color: #fff; border-color: #fff; }
</style>
</head>

const wrapper = document.getElementById('wrapper');
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');

let W, H;
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const ratio = 16 / 9;
  if (vw / vh > ratio) { H = vh; W = Math.round(H * ratio); }
  else                  { W = vw; H = Math.round(W / ratio); }
  canvas.width  = W;
  canvas.height = H;
  wrapper.style.width  = W + 'px';
  wrapper.style.height = H + 'px';
  document.getElementById('backBtn').style.fontSize = (W * 0.012) + 'px';
  detectSlit(); // recalc slit when resize
}
window.addEventListener('resize', resize);

function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}

// iPhone / iOS Safari support:
// HTMLAudioElement with data-URI MP3 may stay locked on iPhone until an audio
// context is resumed by a user gesture.  This WebAudio path unlocks the sound
// when a mode button is pressed, then plays the click SE on every tap/click.
let clickAudioCtx = null;
let clickAudioBuffer = null;
let clickAudioLoading = false;
let clickAudioUnlocked = false;

function clickBase64ToArrayBuffer(dataUri) {
  const base64 = dataUri.split(',')[1] || dataUri;
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function unlockClickAudio() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    if (!clickAudioCtx) clickAudioCtx = new AC();
    if (clickAudioCtx.state === 'suspended') clickAudioCtx.resume().catch(() => {});

    // Play a silent one-sample buffer during the user gesture to unlock iOS audio.
    if (!clickAudioUnlocked) {
      const silent = clickAudioCtx.createBuffer(1, 1, 22050);
      const src = clickAudioCtx.createBufferSource();
      src.buffer = silent;
      src.connect(clickAudioCtx.destination);
      src.start(0);
      clickAudioUnlocked = true;
    }

    if (!clickAudioBuffer && !clickAudioLoading) {
      clickAudioLoading = true;
      const arr = clickBase64ToArrayBuffer(se_click);
      clickAudioCtx.decodeAudioData(arr.slice(0), (buf) => {
        clickAudioBuffer = buf;
        clickAudioLoading = false;
      }, () => {
        clickAudioLoading = false;
      });
    }
    ensureHitAudioLoaded();
  } catch (err) {}
}

function playClickSoundWebAudio() {
  try {
    unlockClickAudio();
    if (clickAudioCtx && clickAudioBuffer) {
      const src = clickAudioCtx.createBufferSource();
      src.buffer = clickAudioBuffer;
      src.connect(clickAudioCtx.destination);
      src.start(0);
      return true;
    }
  } catch (err) {}
  return false;
}

// Override the earlier HTMLAudio version with a WebAudio-first version.
function playClickSound() {
  if (playClickSoundWebAudio()) return;

  // Fallback for browsers where WebAudio decoding is not available yet.
  try {
    if (clickSoundPool.length === 0) {
      for (let i = 0; i < 6; i++) {
        const a = new Audio(se_click);
        a.preload = 'auto';
        a.load();
        clickSoundPool.push(a);
      }
    }
    const a = clickSoundPool[clickSoundPoolIndex];
    clickSoundPoolIndex = (clickSoundPoolIndex + 1) % clickSoundPool.length;
    a.currentTime = 0;
    const p = a.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  } catch (err) {}
}


// Hit combo sounds: 1hit, 2hit, 3hit, 4hit, and 5hit+.
let hitAudioBuffers = new Array(5).fill(null);
let hitAudioLoading = new Array(5).fill(false);
const hitSoundPools = [[], [], [], [], []];
const hitSoundPoolIndex = [0, 0, 0, 0, 0];

function ensureHitAudioLoaded() {
  try {
    if (!clickAudioCtx) return;
    for (let i = 0; i < se_hit_list.length; i++) {
      if (hitAudioBuffers[i] || hitAudioLoading[i]) continue;
      hitAudioLoading[i] = true;
      const arr = clickBase64ToArrayBuffer(se_hit_list[i]);
      clickAudioCtx.decodeAudioData(arr.slice(0), (buf) => {
        hitAudioBuffers[i] = buf;
        hitAudioLoading[i] = false;
      }, () => {
        hitAudioLoading[i] = false;
      });
    }
  } catch (err) {}
}

function playHitSound(hitCount) {
  const idx = Math.min(Math.max(hitCount, 1), 5) - 1;
  try {
    unlockClickAudio();
    ensureHitAudioLoaded();
    if (clickAudioCtx && hitAudioBuffers[idx]) {
      const src = clickAudioCtx.createBufferSource();
      src.buffer = hitAudioBuffers[idx];
      src.connect(clickAudioCtx.destination);
      src.start(0);
      return;
    }
  } catch (err) {}

  // Fallback for browsers where WebAudio decoding is not ready yet.
  try {
    if (hitSoundPools[idx].length === 0) {
      for (let i = 0; i < 4; i++) {
        const a = new Audio(se_hit_list[idx]);
        a.preload = 'auto';
        a.load();
        hitSoundPools[idx].push(a);
      }
    }
    const pool = hitSoundPools[idx];
    const a = pool[hitSoundPoolIndex[idx]];
    hitSoundPoolIndex[idx] = (hitSoundPoolIndex[idx] + 1) % pool.length;
    a.currentTime = 0;
    const p = a.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  } catch (err) {}
}

// Unlock as early as possible on iPhone. These are harmless on PC.
document.addEventListener('touchstart', unlockClickAudio, { once: true, passive: true });
document.addEventListener('pointerdown', unlockClickAudio, { once: true, passive: true });
document.addEventListener('click', unlockClickAudio, { once: true });

// ── Slit Detection ─────────────────────────────────────────────────
// The UI image has a vertical black stripe (the scope slit) at the center.
// We scan a horizontal line at vertical midpoint to find the leftmost and
// rightmost fully-black pixels, then store as canvas-relative values.
let slitX = 0, slitW = 0;

function detectSlit() {
  if (!IMG.ui.complete || !IMG.ui.naturalWidth) return;
  const iw = IMG.ui.naturalWidth;
  const ih = IMG.ui.naturalHeight;
  const oc  = document.createElement('canvas');
  oc.width  = iw; oc.height = ih;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(IMG.ui, 0, 0);

  // Scan multiple rows near the top third to find the slit reliably
  let x0 = iw, x1 = -1;
  for (let scanY = Math.floor(ih * 0.1); scanY < Math.floor(ih * 0.5); scanY += 10) {
    const row = oc2.getImageData(0, scanY, iw, 1).data;
    for (let x = 0; x < iw; x++) {
      const r = row[x*4], g = row[x*4+1], b = row[x*4+2];
      if (r < 20 && g < 20 && b < 20) {
        if (x < x0) x0 = x;
        if (x > x1) x1 = x;
      }
    }
  }

  if (x1 >= x0 && x0 < iw) {
    slitX = (x0 / iw) * W;
    slitW = ((x1 - x0 + 1) / iw) * W;
    console.log('Slit px:', x0, x1, '-> canvas px:', slitX.toFixed(1), slitW.toFixed(1));
  }
}

IMG.ui.onload = () => { resize(); detectSlit(); };

// ── Game State ─────────────────────────────────────────────────────
let gameMode = null;
let score = 0, hiScore = 0;
let hiScoreTime = '';
let gameRunning = false;
let target = null, spawnTimer = null;
let targets = [];
let expertChainTimer = null;
let expertChainActive = false;
let expertChainDirection = null;
let hitFlash = 0, missFlash = 0;
let streakBroken = false;  // true after miss/pass, score shows blank until next hit
let hiScoreId = '';
const modeHiScores = { left: 0, right: 0, oni: 0, expert: 0 };
const modeHiScoreTimes = { left: '', right: '', oni: '', expert: '' };
const modeHiScoreIds = { left: '', right: '', oni: '', expert: '' };

function loadModeHiScore(mode) {
  hiScore = modeHiScores[mode] || 0;
  hiScoreTime = modeHiScoreTimes[mode] || '';
  hiScoreId = modeHiScoreIds[mode] || '';
}

function saveModeHiScore(mode) {
  modeHiScores[mode] = hiScore;
  modeHiScoreTimes[mode] = hiScoreTime;
  modeHiScoreIds[mode] = hiScoreId;
}

function pad2(n) { return String(n).padStart(2,'0'); }

function getDisplayHour(d) {
  const h = d.getHours();
  return h === 0 ? 24 : h;
}

function getNowStr() {
  const d = new Date();
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + '/' + pad2(getDisplayHour(d)) + ':' + pad2(d.getMinutes());
}

function getTimeNum() {
  const d = new Date();
  return getDisplayHour(d) * 100 + d.getMinutes();
}

function generateId(sc) {
  const letters = ['A','B','C'];
  const mult    = [2, 3, 4];
  const sub     = [1, 2, 3];
  const i1 = Math.floor(Math.random() * 3);
  const i2 = Math.floor(Math.random() * 3);
  const t  = getTimeNum();
  const val = (sc * t) * mult[i1] - sub[i2];
  return 'iD:' + letters[i1] + letters[i2] + val;
}

// Original image dimensions
const ORIG_W = 1920, ORIG_H = 1080;

// Hit detection now uses the actual non-transparent pixels of the target PNGs.
// The uploaded JPG-style black background has been converted to transparent PNG data URLs above.
const HIT_ALPHA_THRESHOLD = 32;
const HIT_RADIUS_ORIG = 3; // crosshair + target opaque-pixel hit area

function getScale() { return W / ORIG_W; }

function getAimCenterX() {
  // Use the centre of the detected UI slit/crosshair instead of assuming W/2.
  // Fallback remains W/2 until the UI image has finished loading.
  return slitW > 0 ? slitX + slitW / 2 : W / 2;
}

function getAimCenterY() {
  return H / 2;
}

function getTargetMask(img) {
  if (img._hitMask) return img._hitMask;
  const iw = img.naturalWidth || ORIG_W;
  const ih = img.naturalHeight || ORIG_H;
  const oc = document.createElement('canvas');
  oc.width = iw; oc.height = ih;
  const oc2 = oc.getContext('2d', { willReadFrequently: true });
  oc2.drawImage(img, 0, 0, iw, ih);
  const data = oc2.getImageData(0, 0, iw, ih).data;

  // Find the actual opaque character area. This prevents the full 16:9 image
  // from being treated as the spawn boundary, so the next target appears quickly.
  let minX = iw, minY = ih, maxX = -1, maxY = -1;
  for (let y = 0; y < ih; y++) {
    for (let x = 0; x < iw; x++) {
      const a = data[(y * iw + x) * 4 + 3];
      if (a > HIT_ALPHA_THRESHOLD) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) { minX = 0; minY = 0; maxX = iw - 1; maxY = ih - 1; }

  img._hitMask = { w: iw, h: ih, data, bounds: { minX, minY, maxX, maxY } };
  return img._hitMask;
}

function hasOpaquePixelNear(mask, x, y, radius) {
  const cx = Math.round(x);
  const cy = Math.round(y);
  const r = Math.max(0, radius | 0);
  for (let yy = cy - r; yy <= cy + r; yy++) {
    if (yy < 0 || yy >= mask.h) continue;
    for (let xx = cx - r; xx <= cx + r; xx++) {
      if (xx < 0 || xx >= mask.w) continue;
      const a = mask.data[(yy * mask.w + xx) * 4 + 3];
      if (a > HIT_ALPHA_THRESHOLD) return true;
    }
  }
  return false;
}

// ── Spawn ──────────────────────────────────────────────────────────
function createTarget(actualMode) {
  const sc     = getScale();
  const imgW   = ORIG_W * sc;
  const imgH   = ORIG_H * sc;
  const SPEED  = W / 6;

  let imgs, startImgLeft, direction;
  const idx = Math.floor(Math.random() * 3);

  if (actualMode === 'right') {
    // R→L: character starts from the right side
    imgs = IMG.r2l;
    direction = -1;
  } else {
    // L→R: character starts from the left side
    imgs = IMG.l2r;
    direction = 1;
  }

  const mask = getTargetMask(imgs[idx]);
  // Spawn position is randomized between two points.
  // R→L: character's left edge starts at 75% or 60% of the screen width.
  // L→R: character's right edge starts at 25% or 40% of the screen width.
  const spawnRatio = Math.random() < 0.5 ? 0.75 : 0.60;
  const rightSpawnX = W * spawnRatio;
  const leftSpawnX  = W * (1 - spawnRatio);
  if (direction === -1) {
    startImgLeft = rightSpawnX - mask.bounds.minX * sc;
  } else {
    startImgLeft = leftSpawnX - mask.bounds.maxX * sc;
  }

  return {
    img: imgs[idx],
    mask,
    imgW, imgH,
    imageLeft: startImgLeft,
    direction,
    speed: SPEED,
    passed: false,
  };
}

function spawnTarget() {
  const actualMode = gameMode === 'oni' ? (Math.random() < 0.5 ? 'right' : 'left') : gameMode;
  target = createTarget(actualMode);
}

function clearSpawnTimers() {
  if (spawnTimer) {
    clearTimeout(spawnTimer);
    spawnTimer = null;
  }
  if (expertChainTimer) {
    clearTimeout(expertChainTimer);
    expertChainTimer = null;
  }
}

function scheduleSpawn() {
  clearSpawnTimers();
  const delay = (0.2 + 0.1 + Math.random() * 0.4) * 1000;
  spawnTimer = setTimeout(() => {
    spawnTimer = null;
    if (gameMode === 'expert') spawnExpertWave();
    else spawnTarget();
  }, delay);
}

function spawnExpertWave() {
  targets = [];
  target = null;
  expertChainDirection = Math.random() < 0.5 ? 'right' : 'left';
  expertChainActive = true;
  spawnExpertTarget(expertChainDirection);
  scheduleExpertChainDecision();
}

function spawnExpertTarget(directionMode) {
  targets.push(createTarget(directionMode));
}

function scheduleExpertChainDecision() {
  if (gameMode !== 'expert' || !gameRunning || !expertChainActive) return;

  // 2分の1で、同じ方向から0.3〜0.6秒後に追加スポーン。
  // 「出さない」を引くまでは、次の左右ランダムスポーンは開始しない。
  if (Math.random() < 0.5) {
    const delay = (0.5 + Math.random() * 0.1) * 1000;
    expertChainTimer = setTimeout(() => {
      expertChainTimer = null;
      if (gameMode !== 'expert' || !gameRunning || !expertChainActive) return;
      spawnExpertTarget(expertChainDirection);
      scheduleExpertChainDecision();
    }, delay);
  } else {
    expertChainActive = false;
    expertChainDirection = null;
    if (targets.length === 0) scheduleSpawn();
  }
}

// ── Hit Check ─────────────────────────────────────────────────────
function isTargetAtCenter(t = target) {
  if (!t) return false;
  const sc = getScale();
  const srcX = (getAimCenterX() - t.imageLeft) / sc;
  const srcY = getAimCenterY() / sc;
  if (srcX < 0 || srcX >= t.mask.w || srcY < 0 || srcY >= t.mask.h) return false;
  return hasOpaquePixelNear(t.mask, srcX, srcY, HIT_RADIUS_ORIG);
}

function getActiveTargets() {
  return gameMode === 'expert' ? targets : (target ? [target] : []);
}

// ── Input ──────────────────────────────────────────────────────────
function handleTap(e) {
  if (!gameRunning) return;
  e.preventDefault();
  playClickSound();

  const activeTargets = getActiveTargets();
  // Ignore extra taps while no target is on screen, so rapid clicking after a hit
  // does not accidentally break the streak before the next target appears.
  if (activeTargets.length === 0) return;

  const hitIndex = activeTargets.findIndex(t => isTargetAtCenter(t));
  if (hitIndex >= 0) {
    if (streakBroken) { score = 1; streakBroken = false; }
    else score++;
    playHitSound(score);
    if (score > hiScore) {
      hiScore = score;
      hiScoreTime = getNowStr();
      hiScoreId   = generateId(score);
      saveModeHiScore(gameMode);
    }
    hitFlash = 14;

    if (gameMode === 'expert') {
      const hitTarget = activeTargets[hitIndex];
      const idx = targets.indexOf(hitTarget);
      if (idx >= 0) targets.splice(idx, 1);
      if (targets.length === 0 && !expertChainActive) scheduleSpawn();
    } else {
      target = null;
      scheduleSpawn();
    }
  } else {
    streakBroken = true;
    missFlash = 14;
  }
}
canvas.addEventListener('mousedown', handleTap);
canvas.addEventListener('touchstart', handleTap, { passive: false });

// ── Game Loop ──────────────────────────────────────────────────────
let lastTime = null;
function gameLoop(ts) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  const activeTargets = getActiveTargets();
  if (activeTargets.length > 0) {
    const sc = getScale();
    const blackLeft = slitW > 0 ? slitX : W / 2;
    const blackRight = slitW > 0 ? slitX + slitW : W / 2;

    for (let i = activeTargets.length - 1; i >= 0; i--) {
      const t = activeTargets[i];
      t.imageLeft += t.direction * t.speed * dt;
      const charLeft  = t.imageLeft + t.mask.bounds.minX * sc;
      const charRight = t.imageLeft + t.mask.bounds.maxX * sc;
      // Out判定は、キャラの不透明部分が中央の黒い区間を完全に過ぎた時点。
      // R→Lならキャラ右端が黒区間の左端を抜けたらアウト、
      // L→Rならキャラ左端が黒区間の右端を抜けたらアウト。
      const passedBlackZone = t.direction === -1 ? charRight < blackLeft
                                                  : charLeft > blackRight;
      if (passedBlackZone && !t.passed) {
        t.passed = true;
        streakBroken = true;
        missFlash = 20;
        if (gameMode === 'expert') {
          const idx = targets.indexOf(t);
          if (idx >= 0) targets.splice(idx, 1);
        } else {
          target = null;
        }
      }
    }

    if (gameMode === 'expert' && targets.length === 0 && !expertChainActive) {
      scheduleSpawn();
    } else if (gameMode !== 'expert' && !target) {
      scheduleSpawn();
    }
  }

  draw();
  if (hitFlash  > 0) hitFlash--;
  if (missFlash > 0) missFlash--;
  requestAnimationFrame(gameLoop);
}

// ── Draw ───────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 1. Background (bottom layer)
  ctx.drawImage(IMG.bg, 0, 0, W, H);

  // 2. Target — clipped to slit only, black removed via 'screen'
  const drawTargets = getActiveTargets();
  if (drawTargets.length > 0 && slitW > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(slitX, 0, slitW, H);
    ctx.clip();
    ctx.globalCompositeOperation = 'screen';
    for (const t of drawTargets) {
      ctx.drawImage(t.img, t.imageLeft, 0, t.imgW, t.imgH);
    }
    ctx.restore();
  }

  // 3. UI overlay — drawn OPAQUE everywhere EXCEPT the slit
  //    We draw left portion and right portion, skipping the slit gap.
  if (slitW > 0) {
    const sx = slitX, sw = slitW;
    // Left of slit
    if (sx > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, sx, H);
      ctx.clip();
      ctx.drawImage(IMG.ui, 0, 0, W, H);
      ctx.restore();
    }
    // Right of slit
    const rx = sx + sw;
    if (rx < W) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx, 0, W - rx, H);
      ctx.clip();
      ctx.drawImage(IMG.ui, 0, 0, W, H);
      ctx.restore();
    }
    // Slit area: draw UI with screen blend so the crosshair dot (white pixel) shows
    // but the black background of the slit stays invisible
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx, 0, sw, H);
    ctx.clip();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(IMG.ui, 0, 0, W, H);
    ctx.restore();
  } else {
    // Fallback before slit detected
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(IMG.ui, 0, 0, W, H);
    ctx.restore();
  }

  // 4. Score UI (drawn on top of everything)
  const fs      = W * 0.035;
  const fsSmall = W * 0.018;

  // Current score — top center
  ctx.save();
  ctx.font        = `bold ${fs}px Arial`;
  ctx.textAlign   = 'center';
  ctx.fillStyle   = hitFlash > 0 ? '#00ff88' : missFlash > 0 ? '#ff4444' : '#ffffff';
  ctx.shadowColor = hitFlash > 0 ? '#00ff88' : missFlash > 0 ? '#ff3333' : 'transparent';
  ctx.shadowBlur  = hitFlash > 0 || missFlash > 0 ? 18 : 0;
  ctx.fillText(score, W / 2, H * 0.07);
  ctx.restore();

  // Current date/time — top left
  ctx.save();
  ctx.font        = `${fsSmall}px Arial`;
  ctx.textAlign   = 'left';
  ctx.fillStyle   = 'rgba(255,255,255,0.82)';
  ctx.shadowColor = 'rgba(255,255,255,0.55)';
  ctx.shadowBlur  = 4;
  ctx.fillText(getNowStr(), W * 0.03, H * 0.06);
  ctx.restore();

  // Hi score — top right
  ctx.save();
  ctx.font        = `${fsSmall}px Arial`;
  ctx.textAlign   = 'right';
  ctx.fillStyle   = '#ffd700';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur  = 6;
  ctx.fillText('BEST: ' + hiScore, W * 0.97, H * 0.06);

  ctx.font        = `${fsSmall * 0.72}px Arial`;
  ctx.fillStyle   = 'rgba(255,215,0,0.86)';
  ctx.shadowBlur  = 4;
  if (hiScoreTime) ctx.fillText(hiScoreTime, W * 0.97, H * 0.085);
  if (hiScoreId)   ctx.fillText(hiScoreId,   W * 0.97, H * 0.108);
  ctx.restore();

  // Mode label — upper right area
  if (gameMode === 'oni') {
    ctx.save();
    ctx.font        = `bold ${fsSmall}px Arial`;
    ctx.textAlign   = 'right';
    ctx.fillStyle   = '#8a5cff';
    ctx.shadowColor = '#8a5cff';
    ctx.shadowBlur  = 10;
    ctx.fillText('鬼モード', W * 0.97, H * 0.145);
    ctx.restore();
  } else if (gameMode === 'expert') {
    ctx.save();
    ctx.font        = `bold ${fsSmall}px Arial`;
    ctx.textAlign   = 'right';
    ctx.fillStyle   = '#8a5cff';
    ctx.shadowColor = '#8a5cff';
    ctx.shadowBlur  = 10;
    ctx.fillText('エキスパート', W * 0.97, H * 0.145);
    ctx.restore();
  }
}



// ── Score Share ───────────────────────────────────────────────────
function downloadGameScreenshot() {
  try {
    const a = document.createElement('a');
    a.download = 'okiaimx_score_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (err) {}
}

function shareScore() {
  downloadGameScreenshot();
  const text = '#okiaimx\nハイスコア' + hiScore + '\nhttps://okiaimx.s.gy/awpboy';
  const url = 'https://x.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener,noreferrer');
}

// ── Score Verification ─────────────────────────────────────────────
function openScoreCheckPanel() {
  const panel = document.getElementById('scoreCheckPanel');
  if (!panel) return;
  panel.style.display = 'block';
  const result = document.getElementById('verifyResult');
  const progress = document.getElementById('verifyProgress');
  if (result) {
    result.textContent = '';
    result.className = 'verify-result';
  }
  if (progress) {
    progress.classList.remove('run');
    progress.style.display = 'none';
  }
}

function closeScoreCheckPanel() {
  const panel = document.getElementById('scoreCheckPanel');
  if (panel) panel.style.display = 'none';
}

function isValidTimeCodeForId(t) {
  if (!Number.isInteger(t)) return false;
  const h = Math.floor(t / 100);
  const m = t % 100;
  return h >= 1 && h <= 24 && m >= 0 && m <= 59;
}

function verifyScoreId(score, idText) {
  const id = String(idText || '').trim().toUpperCase();
  const m = id.match(/^ID:([ABC])([ABC])(-?\d+)$/);
  if (!Number.isFinite(score) || score <= 0 || !Number.isInteger(score) || !m) return false;

  const multMap = { A: 2, B: 3, C: 4 };
  const subMap = { A: 1, B: 2, C: 3 };
  const first = m[1];
  const second = m[2];
  const idNum = Number(m[3]);
  const base = idNum + subMap[second];
  const divisor = score * multMap[first];

  if (!Number.isInteger(idNum) || divisor <= 0 || base % divisor !== 0) return false;

  const timeCode = base / divisor;
  return isValidTimeCodeForId(timeCode);
}

function runScoreVerification() {
  const scoreInput = document.getElementById('verifyScoreInput');
  const idInput = document.getElementById('verifyIdInput');
  const progress = document.getElementById('verifyProgress');
  const result = document.getElementById('verifyResult');
  if (!scoreInput || !idInput || !progress || !result) return;

  result.textContent = '';
  result.className = 'verify-result';
  progress.style.display = 'block';
  progress.classList.remove('run');
  void progress.offsetWidth;
  progress.classList.add('run');

  const score = Number(scoreInput.value);
  const idText = idInput.value;

  setTimeout(() => {
    const ok = verifyScoreId(score, idText);
    result.className = ok ? 'verify-result ok' : 'verify-result ng';
    result.textContent = ok ? 'verify ✓' : '確認できませんでした';
  }, 1100);
}

// ── Menu Control ───────────────────────────────────────────────────
function startGame(mode) {
  unlockClickAudio();
  gameMode = mode; score = 0; gameRunning = true;
  loadModeHiScore(mode);
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('shareScoreBtn').style.display = 'block';
  lastTime = null; target = null; targets = [];
  expertChainActive = false; expertChainDirection = null;
  clearSpawnTimers();
  scheduleSpawn();
  requestAnimationFrame(gameLoop);
}

function goMenu() {
  gameRunning = false; target = null; targets = [];
  expertChainActive = false; expertChainDirection = null;
  clearSpawnTimers();
  document.getElementById('menuScreen').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('shareScoreBtn').style.display = 'none';
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(IMG.bg, 0, 0, W, H);
}

IMG.bg.onload = () => { ctx.drawImage(IMG.bg, 0, 0, W, H); };

resize();
